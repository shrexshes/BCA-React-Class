<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .heading1 {
            background-color: red;
        }

        /* 12px=1rem */
        .para1 {
            border: 1px solid black;
            padding: 5rem;
            margin: 8rem;

            text-decoration: line-through;
            text-transform: capitalize;
        }

        .m-div > p{
            background-color: blue;
        }
    </style>

</head>

<body>
    <h1 style="background-color: aqua;">Css - Cascading Style Sheet</h1>
    <h2 class="heading1">Css - Cascading Style Sheet </h2>
    <div>
        <p class="para1">This is content</p>
    </div>

    <div class="m-div">
        <p>CSIT 1</p>
        <p>CSIT 2</p>
        <p>CSIT 3</p>
        <p>BCA 3</p>
    </div>
</body>

</html>
